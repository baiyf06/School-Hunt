<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭规划行动手册 2026–2028</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #8a8a84;
  --ink4: #b8b8b0;
  --paper: #faf9f6;
  --paper2: #f2f1ec;
  --paper3: #e8e7e0;
  --rule: rgba(26,26,24,0.10);
  --rule2: rgba(26,26,24,0.18);
  --accent: #2d5a8e;
  --accent2: #e8f0f8;
  --green: #2d7a5a;
  --green2: #e8f5ef;
  --amber: #8a6000;
  --amber2: #fdf3d8;
  --red: #8a2020;
  --red2: #fde8e8;
  --col-house: #2d5a8e;
  --col-school: #2d7a5a;
  --col-job: #8a6000;
  --col-general: #5a5a5a;
  --serif: 'Noto Serif SC', Georgia, serif;
  --sans: 'Noto Sans SC', system-ui, sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.site-header {
  background: var(--ink);
  color: var(--paper);
  padding: 2.5rem 2rem 2rem;
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 23px,
    rgba(255,255,255,0.03) 23px,
    rgba(255,255,255,0.03) 24px
  );
  pointer-events: none;
}
.header-kicker {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(250,249,246,0.45);
  margin-bottom: 10px;
}
.header-title {
  font-family: var(--serif);
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 600;
  line-height: 1.25;
  color: var(--paper);
  margin-bottom: 8px;
}
.header-sub {
  font-size: 13px;
  color: rgba(250,249,246,0.55);
  max-width: 560px;
  line-height: 1.65;
  margin-bottom: 1.5rem;
}
.header-pills {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.header-pill {
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.7);
  display: flex; align-items: center; gap: 5px;
}
.header-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
}

/* ─── LAYOUT ─── */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 200px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  background: var(--paper2);
  border-right: 1px solid var(--rule);
  padding: 1.5rem 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: thin;
}
.sidebar-section-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--ink4);
  padding: 0 1.25rem;
  margin: 1.25rem 0 6px;
}
.sidebar-section-label:first-child { margin-top: 0; }
.month-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 7px 1.25rem;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink2);
  text-align: left;
  transition: background .12s, color .12s;
  border-left: 3px solid transparent;
}
.month-btn:hover { background: var(--paper3); color: var(--ink); }
.month-btn.active {
  background: var(--paper);
  color: var(--ink);
  border-left-color: var(--accent);
  font-weight: 500;
}
.month-btn.has-deadline .deadline-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red);
  flex-shrink: 0;
}
.month-btn .month-label { flex: 1; }

/* ─── MAIN ─── */
.main {
  padding: 2rem 2rem 4rem;
  max-width: 800px;
}

/* ─── MONTH HEADER ─── */
.month-header {
  margin-bottom: 1.75rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--rule2);
}
.month-eyebrow {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 6px;
}
.month-title {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 5px;
}
.month-subtitle {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.6;
  margin-bottom: 10px;
}
.deadline-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.chip-red { background: var(--red2); color: var(--red); }
.chip-amber { background: var(--amber2); color: var(--amber); }
.chip-green { background: var(--green2); color: var(--green); }

/* ─── PROGRESS BAR ─── */
.month-progress {
  margin-bottom: 1.25rem;
}
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--ink3); margin-bottom: 5px;
}
.progress-track {
  height: 4px; background: var(--paper3); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .4s ease;
}

/* ─── WEEK CARDS ─── */
.week-list { display: flex; flex-direction: column; gap: 10px; }

.week-card {
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: box-shadow .15s;
}
.week-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.week-card.current { border-color: var(--accent); }

.week-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  user-select: none;
  background: var(--paper2);
  transition: background .1s;
}
.week-header:hover { background: var(--paper3); }

.week-num {
  font-family: var(--serif);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink3);
  min-width: 42px;
}
.week-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  flex: 1;
}
.week-dates {
  font-size: 11px;
  color: var(--ink3);
}
.now-pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--accent2);
  color: var(--accent);
  font-weight: 500;
}
.task-count {
  font-size: 11px;
  color: var(--ink3);
  min-width: 36px;
  text-align: right;
}
.chevron {
  font-size: 14px;
  color: var(--ink4);
  transition: transform .15s;
  flex-shrink: 0;
}
.week-card.open .chevron { transform: rotate(90deg); }

.week-progress { height: 2px; background: var(--paper3); }
.week-progress-fill { height: 100%; background: var(--green); transition: width .3s; }

.week-body {
  display: none;
  padding: 14px 16px 16px;
  border-top: 1px solid var(--rule);
}
.week-card.open .week-body { display: block; }

/* ─── TRACK ─── */
.track { margin-bottom: 14px; }
.track:last-child { margin-bottom: 0; }
.track-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 7px;
}
.track-bar {
  width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0;
}

/* ─── TASKS ─── */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--rule);
}
.task-item:last-child { border-bottom: none; }

.task-check {
  width: 15px; height: 15px;
  border: 1.5px solid var(--ink4);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .1s;
  background: #fff;
}
.task-check.done {
  background: var(--green);
  border-color: var(--green);
}
.task-check.done::after {
  content: '';
  width: 8px; height: 5px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}

.task-content { flex: 1; }
.task-text {
  font-size: 13px;
  color: var(--ink);
  line-height: 1.55;
}
.task-item.done .task-text {
  color: var(--ink4);
  text-decoration: line-through;
}
.urgency-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: 4px;
  font-weight: 500;
  vertical-align: middle;
}
.urg-red { background: var(--red2); color: var(--red); }
.urg-amber { background: var(--amber2); color: var(--amber); }
.urg-green { background: var(--green2); color: var(--green); }

/* ─── DECISION BOX ─── */
.decision-box {
  margin-top: 14px;
  padding: 11px 14px;
  background: var(--accent2);
  border-radius: var(--radius);
  border-left: 3px solid var(--accent);
}
.decision-title {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.decision-text {
  font-size: 12px;
  color: var(--ink2);
  line-height: 1.6;
}

/* ─── LEGEND ─── */
.legend {
  display: flex; gap: 18px; flex-wrap: wrap;
  padding: 1rem 2rem;
  background: var(--paper2);
  border-bottom: 1px solid var(--rule);
  font-size: 11px;
  color: var(--ink2);
}
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-swatch { width: 14px; height: 3px; border-radius: 2px; flex-shrink: 0; }

/* ─── MOBILE ─── */
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    display: flex;
    overflow-x: auto;
    padding: 0.75rem 0;
    border-right: none;
    border-bottom: 1px solid var(--rule);
    flex-wrap: nowrap;
    gap: 0;
  }
  .sidebar-section-label { display: none; }
  .month-btn {
    padding: 6px 14px;
    border-left: none;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .month-btn.active { border-bottom-color: var(--accent); border-left-color: transparent; }
  .main { padding: 1.25rem 1rem 3rem; }
}

/* ─── PRINT ─── */
@media print {
  .sidebar { display: none; }
  .layout { grid-template-columns: 1fr; }
  .week-body { display: block !important; }
  .chevron { display: none; }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--paper3); border-radius: 3px; }
</style>
</head>

const KEY_CHECKED = 'fplan_checked_v2';
const KEY_MONTH   = 'fplan_month_v2';
const KEY_OPEN    = 'fplan_open_v2';

function loadChecked() {
  try { return new Set(JSON.parse(localStorage.getItem(KEY_CHECKED) || '[]')); }
  catch(e) { return new Set(); }
}
function saveChecked(set) {
  try { localStorage.setItem(KEY_CHECKED, JSON.stringify([...set])); } catch(e) {}
}
function loadMonth() {
  try { return localStorage.getItem(KEY_MONTH) || '2026-04'; }
  catch(e) { return '2026-04'; }
}
function saveMonth(m) {
  try { localStorage.setItem(KEY_MONTH, m); } catch(e) {}
}
function loadOpen() {
  try {
    const saved = localStorage.getItem(KEY_OPEN);
    return saved ? new Set(JSON.parse(saved)) : new Set(['w2604a']);
  } catch(e) { return new Set(['w2604a']); }
}
function saveOpen(set) {
  try { localStorage.setItem(KEY_OPEN, JSON.stringify([...set])); } catch(e) {}
}

let checked = loadChecked();
let currentMonth = loadMonth();
let openWeeks = loadOpen();

function getMonthProgress(month) {
  let total = 0, done = 0;
  month.weeks.forEach(w => {
    w.tracks && w.tracks.forEach(t => {
      t.tasks && t.tasks.forEach(task => {
        total++;
        if (checked.has(taskId(w.id, task.text))) done++;
      });
    });
  });
  return { total, done, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}

function taskId(weekId, text) {
  return weekId + '|' + text.slice(0, 30);
}

  DATA.forEach(m => {

    years[y].push(m);
  });
  let html = '';
  Object.entries(years).forEach(([year, months]) => {
    html += `<div class="sidebar-section-label">${year}</div>`;
    months.forEach(m => {
      const hasRed = m.deadlines && m.deadlines.some(d => d.type === 'red');
      const prog = getMonthProgress(m);
      html += `<button class="month-btn${m.id === currentMonth ? ' active' : ''}${hasRed ? ' has-deadline' : ''}"
        onclick="setMonth('${m.id}')">
        <span class="month-label">${m.nav}</span>
        ${hasRed ? '<span class="deadline-dot"></span>' : ''}
        ${prog.done > 0 ? `<span style="font-size:10px;color:var(--ink4)">${prog.done}/${prog.total}</span>` : ''}
      </button>`;
    });
  });
  sidebar.innerHTML = html;
}

function setMonth(id) {
  currentMonth = id;
  saveMonth(id);
  renderSidebar();
  renderMain();
  window.scrollTo({ top: 0 });
}

function toggleWeek(id) {
  if (openWeeks.has(id)) openWeeks.delete(id);
  else openWeeks.add(id);
  saveOpen(openWeeks);
  renderMain();
}

function resetAll() {
  if (!confirm('确定清除所有已完成的勾选记录吗？此操作不可撤销。')) return;
  checked = new Set();
  saveChecked(checked);
  flashSaved('已重置');
  renderSidebar();
  renderMain();
}

function flashSaved(msg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = msg || '已保存 ✓';
  el.style.color = '#2d7a5a';
  setTimeout(() => {
    el.textContent = '进度已自动保存';
    el.style.color = '#8a8a84';
  }, 1800);
}

function toggleTask(weekId, text) {
  const id = taskId(weekId, text);
  if (checked.has(id)) checked.delete(id);
  else checked.add(id);
  saveChecked(checked);
  flashSaved();
  renderSidebar();
  renderMain();
}

function urgClass(u) {
  if (!u) return '';
  if (['现在','本周','紧急','最后机会','1月15日'].some(x => u.includes(x))) return 'urg-red';
  if (['本月','关键','Jan 15截止','11月10日前','提前准备','4月15日截止'].some(x => u.includes(x))) return 'urg-amber';
  return 'urg-green';
}

function renderMain() {
  const month = DATA.find(m => m.id === currentMonth);
  if (!month) return;
  const prog = getMonthProgress(month);

  let html = `<div class="month-header">
    <div class="month-eyebrow">行动手册</div>
    <div class="month-title">${month.title}</div>
    <div class="month-subtitle">${month.subtitle}</div>
    <div class="deadline-chips">
      ${(month.deadlines || []).map(d => `<span class="chip chip-${d.type}">${d.text}</span>`).join('')}
    </div>
  </div>`;

  if (prog.total > 0) {
    html += `<div class="month-progress">
      <div class="progress-row">
        <span>本月完成进度</span>
        <span>${prog.done} / ${prog.total} 项任务</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${prog.pct}%"></div>
      </div>
    </div>`;
  }

  html += `<div class="week-list">`;

  month.weeks.forEach(week => {
    const isOpen = openWeeks.has(week.id);
    let wTotal = 0, wDone = 0;
    (week.tracks || []).forEach(t => (t.tasks || []).forEach(task => {
      wTotal++;
      if (checked.has(taskId(week.id, task.text))) wDone++;
    }));
    const wPct = wTotal > 0 ? Math.round(wDone / wTotal * 100) : 0;

    html += `<div class="week-card${week.isNow ? ' current' : ''}${isOpen ? ' open' : ''}">
      <div class="week-header" onclick="toggleWeek('${week.id}')">
        <span class="week-num">${week.num}</span>
        <span class="week-name">${week.name}${week.isNow ? ' <span class="now-pill">本周</span>' : ''}</span>
        <span class="week-dates">${week.dates}</span>
        <span class="task-count">${wDone}/${wTotal}</span>
        <span class="chevron">›</span>
      </div>
      <div class="week-progress"><div class="week-progress-fill" style="width:${wPct}%"></div></div>
      <div class="week-body">`;

    (week.tracks || []).forEach(track => {
      html += `<div class="track">
        <div class="track-label">
          <div class="track-bar" style="background:${track.color}"></div>
          ${track.name}
        </div>
        <div>`;
      (track.tasks || []).forEach(task => {
        const tid = taskId(week.id, task.text);
        const isDone = checked.has(tid);
        const safeText = task.text.replace(/'/g, "\\'");
        html += `<div class="task-item${isDone ? ' done' : ''}">
          <div class="task-check${isDone ? ' done' : ''}" onclick="toggleTask('${week.id}','${safeText}')"></div>
          <div class="task-content">
            <span class="task-text">${task.text}</span>
            ${task.urgent ? `<span class="urgency-tag ${urgClass(task.urgent)}">${task.urgent}</span>` : ''}
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });

    if (week.decision) {
      html += `<div class="decision-box">
        <div class="decision-title">月度检查点</div>
        <div class="decision-text">${week.decision}</div>
      </div>`;
    }

    html += `</div></div>`;
  });

  html += `</div>`;
  document.getElementById('main').innerHTML = html;
}

renderSidebar();
renderMain();
</script>
</body>
</html>
